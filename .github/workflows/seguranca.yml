name: Esteira DevSecOps UNDB - Sucesso Marco

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente e Instalar Dependencias
        run: |
          npm install -g snyk snyk-to-html
          python -m pip install --upgrade pip
          # Forca a instalacao das bibliotecas vulneraveis para o Snyk ler
          pip install -r requirements.txt || true

      - name: 3. Scanner Snyk (Deteccao Forcada)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O comando test agora olha para o ambiente instalado
          snyk test --json > snyk_results.json || echo "{}" > snyk_results.json

      - name: 4. Gerar Dashboard Profissional
        if: always()
        run: |
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 5. Scanner Bandit (Analise de Codigo)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r . -f html -o relatorio_bandit.html || true

      - name: 6. Upload dos Resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            dashboard_profissional.html
            relatorio_bandit.html