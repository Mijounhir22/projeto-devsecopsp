name: Auditoria de Bibliotecas
on: [push]

jobs:
  esteira-tcc:
    name: Esteira DevSecOps (UNDB)
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Ambiente
        run: |
          npm install -g snyk snyk-to-html
          pip install bandit django==1.11.29 || true

      - name: 3. Scanner Snyk (Busca Automática)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O --all-projects faz o link automático com requirements.txt e package.json
          snyk test --all-projects --json > snyk_results.json

      - name: 4. Gerar Dashboard Profissional
        if: always()
        run: |
          snyk-to-html -i snyk_results.json -o relatorio_visual_snyk.html

      - name: 5. Scanner Bandit (SAST)
        continue-on-error: true
        run: bandit -r . -f html -o relatorio_bandit_tcc.html || true

      - name: 6. Upload de Artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            relatorio_visual_snyk.html
            relatorio_bandit_tcc.html