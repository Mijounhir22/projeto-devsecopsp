name: Esteira DevSecOps - Snyk

on:
  push:
    branches: ["main", "principal"]

jobs:
  analise_seguranca:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Gitleaks (Scanner de Credenciais)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # Isso permite que a esteira continue para o Snyk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Snyk (Scanner de Vulnerabilidades)
        uses: snyk/actions/python-3.10@master
        # Remova o continue-on-error apenas desta etapa se quiser que o resultado final seja VERMELHO
        with:
          args: --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}