Aqui está o código definitivo. Ele foi ajustado para ignorar os arquivos de Node.js que estão na pasta backup e focar exclusivamente no seu arquivo requirements.txt que já confirmamos estar salvo corretamente.

Substitua todo o conteúdo do seu arquivo seguranca.yml por este:

YAML
name: Esteira DevSecOps UNDB - Versao Final v3

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente e Ferramentas
        run: |
          # Instala o scanner e o conversor de HTML
          npm install -g snyk snyk-to-html
          # Atualiza o pip para evitar erros de instalacao
          python -m pip install --upgrade pip setuptools wheel

      - name: 3. Instalar Dependencias (Seu arquivo real)
        run: |
          # Instalamos o que voce salvou no PC (Django 1.11, etc)
          # O '|| true' evita que a esteira pare se uma biblioteca for antiga demais
          pip install -r requirements.txt || true

      - name: 4. Scanner Snyk (Gerando JSON)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Forçamos o Snyk a ler apenas o seu requirements.txt
          # O '|| true' no final e ESSENCIAL para salvar o JSON mesmo com falhas criticas
          snyk test --file=requirements.txt --package-manager=pip --json > snyk_results.json || true

      - name: 5. Gerar Dashboard Profissional
        if: always()
        run: |
          # Converte o resultado do scanner em uma pagina HTML bonita
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 6. Upload do Relatorio para o Aluno
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Snyk-TCC-UNDB
          path: dashboard_profissional.html