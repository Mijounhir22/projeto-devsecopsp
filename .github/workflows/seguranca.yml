name: Esteira DevSecOps UNDB - Auditoria Final 2026

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ferramentas
        run: |
          npm install -g snyk snyk-to-html
          python -m pip install --upgrade pip

      - name: 3. Instalar Dependencias Vulneraveis
        run: |
          # Instalando as versoes que voce deu 'cat' e confirmou
          pip install -r requirements.txt || true

      - name: 4. Scanner Snyk (Gerando JSON Real)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O segredo: usamos o snyk test e garantimos a saída JSON
          snyk test --file=requirements.txt --package-manager=pip --json-file-output=snyk_results.json || true

      - name: 5. Gerar Dashboard do TCC
        if: always()
        run: |
          # Verificamos se o arquivo existe e tem conteudo antes de converter
          if [ -s snyk_results.json ]; then
            snyk-to-html -i snyk_results.json -o dashboard_profissional.html
          else
            echo "ERRO: O scanner nao gerou resultados. Verifique seu SNYK_TOKEN."
            exit 1
          fi

      - name: 6. Upload do Artefato para Download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Seguranca-TCC
          path: dashboard_profissional.html