name: Esteira DevSecOps - Analise de Seguranca

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analise_seguranca:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixando o Codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 2. Gitleaks (Procurar Senhas Expostas)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Horusec (SQL Injection e LGPD)
        run: curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/master/deployments/scripts/install.sh | bash && ./horusec start -p="./" -e="true"