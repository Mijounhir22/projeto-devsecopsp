name: Esteira DevSecOps - Relatorio Profissional

on:
  push:
    branches: ["main", "principal"]

jobs:
  analise_seguranca:
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Gitleaks (Scanner de Credenciais)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Gerar Dados para Relatorios (Snyk)
        continue-on-error: true
        uses: snyk/actions/python-3.10@master
        with:
          # Gera o arquivo SARIF para a aba Security
          args: --sarif-file-output=snyk.sarif --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 4. Gerar Dashboard HTML com Graficos
        continue-on-error: true
        run: |
          npm install -g snyk-to-html
          # Força a geração do JSON mesmo com vulnerabilidades
          snyk test --json --all-projects > snyk_results.json || true
          snyk-to-html -i snyk_results.json -o dashboard_seguranca.html
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 5. Ativar Aba Security (Interface Visual)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: 6. Upload do Artefato para o TCC
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Visual-Graficos
          path: dashboard_seguranca.html