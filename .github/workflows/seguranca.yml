name: Scan de Conformidade LGPD

on:
  push:
    branches: [ "main" ]

jobs:
  analise_seguranca:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixando o Codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Gitleaks (Senhas e Chaves)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Horusec (Analise via Docker)
        run: |
          docker run --rm -v $(pwd):/src horusec/horusec-cli:latest horusec start -p /src -P $(pwd) -e="true"