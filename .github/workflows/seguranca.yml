name: Auditoria de Bibliotecas
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  esteira-tcc:
    name: Esteira de Segurança DevSecOps (TCC)
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python e Instalar Dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 3. Preparar Ambiente (Django e Paramiko)
        # Instalamos manualmente para o Snyk nao dar 'exit code 2'
        run: |
          pip install --upgrade pip
          pip install django paramiko bandit || true

      - name: 4. Instalar Snyk-to-HTML
        run: npm install -g snyk snyk-to-html

      - name: 5. Scanner Snyk (Gerar Dados do Dashboard)
        continue-on-error: true # Garante que o dashboard seja gerado mesmo com falhas
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O --skip-unresolved ignora o que faltar e gera o JSON
          snyk test --json --skip-unresolved > snyk_results.json
          snyk monitor --all-projects --skip-unresolved

      - name: 6. Geração do Dashboard HTML Profissional
        continue-on-error: true
        run: |
          # Transforma o JSON no relatório visual que você quer mostrar
          snyk-to-html -i snyk_results.json -o relatorio_snyk.html

      - name: 7. Disponibilizar Evidências para Download
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Seguranca-TCC
          path: |
            relatorio_snyk.html

      - name: 8. Verificação de Compliance (Onde o X Vermelho aparece)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Validando segurança... Se houver falhas graves, o X VERMELHO aparecerá agora."
          # Este comando sem continue-on-error gera o erro proposital para a banca
          snyk test --all-projects --severity-threshold=high --skip-unresolved