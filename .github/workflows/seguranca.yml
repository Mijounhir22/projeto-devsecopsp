name: Esteira DevSecOps UNDB - Sucesso Março

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente
        run: |
          npm install -g snyk snyk-to-html
          # Garante que as bibliotecas vulneraveis existam no ambiente da esteira
          pip install django==1.11.29 requests==2.6.0 bandit || true

      - name: 3. Scanner Snyk (Forçar Leitura de Arquivos)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Varre todos os manifestos encontrados para garantir que as 26 falhas apareçam
          snyk test --all-projects --json > snyk_results.json || echo "{}" > snyk_results.json

      - name: 4. Gerar Dashboard Profissional
        if: always()
        run: |
          # Transforma o resultado no HTML visual para o TCC
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 5. Scanner Bandit (Analise de Codigo)
        continue-on-error: true
        run: bandit -r . -f html -o relatorio_bandit.html || true

      - name: 6. Upload dos Resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            dashboard_profissional.html
            relatorio_bandit.html