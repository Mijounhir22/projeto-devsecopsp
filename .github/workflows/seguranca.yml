name: Auditoria de Bibliotecas
on: [push]

# Resolve os avisos amarelos de Node.js obsoleto no GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vulnerabilidades:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 3. Instalar Ferramentas de Relatorio
        run: |
          npm install -g snyk snyk-to-html bandit

      - name: 4. Gerar Relatórios e Link Oficial (Snyk Monitor)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Gera o Link Oficial no dashboard do Snyk (O link que você queria)
          snyk monitor --all-projects
          # Gera os dados brutos para o relatório HTML local
          snyk test --json > snyk_results.json
          # Executa a análise de código Python com Bandit
          bandit -r . -f html -o relatorio_bandit.html

      - name: 5. Converter JSON para HTML Visual
        continue-on-error: true
        run: |
          snyk-to-html -i snyk_results.json -o relatorio_snyk.html

      - name: 6. Disponibilizar Relatórios para Download
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Seguranca-TCC
          path: |
            relatorio_snyk.html
            relatorio_bandit.html

      - name: 7. Status Final da Pipeline
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Validando segurança crítica do repositório ConveFlow..."
          snyk test --all-projects --severity-threshold=high

      - name: 8. Limpeza de Ambiente e Log Final
        if: always()
        run: |
          echo "Removendo arquivos temporários de auditoria..."
          rm -f snyk_results.json
          echo "Análise concluída com sucesso em $(date)"
