name: Esteira DevSecOps UNDB - Sucesso Março

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente (Forçar Dependências)
        run: |
          npm install -g snyk snyk-to-html
          # Forçamos a instalação para que o Snyk tenha o que ler no ambiente
          pip install django==1.11.29 requests==2.6.0 bandit || true

      - name: 3. Scanner Snyk (Busca Total)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O parâmetro --all-projects varre subpastas e detecta o requirements.txt automaticamente
          snyk test --all-projects --json > snyk_results.json || echo "{}" > snyk_results.json

      - name: 4. Gerar Dashboard Profissional
        if: always()
        run: |
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 5. Scanner Bandit (Análise de Código)
        continue-on-error: true
        run: |
          bandit -r . -f html -o relatorio_bandit.html || true

      - name: 6. Upload dos Resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            dashboard_profissional.html
            relatorio_bandit.htm