name: Esteira DevSecOps UNDB - Auditoria Final

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ferramentas de Relatorio
        run: |
          npm install -g snyk snyk-to-html
          # Criamos o arquivo com bibliotecas críticas para garantir a trilha
          echo "django==1.11.28" > requirements.txt
          echo "requests==2.6.0" >> requirements.txt

      - name: 3. Scanner de Codigo Aberto (Modo Unmanaged)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O segredo: 'snyk code test' varre o código fonte em busca de falhas
          # 'snyk test --all-projects' tenta todas as formas de detecção simultâneas
          snyk test --all-projects --json > snyk_results.json || echo "{}" > snyk_results.json

      - name: 4. Gerar Dashboard de Auditoria
        if: always()
        run: |
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 5. Upload do Resultado para o Aluno
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencia-Final-Auditoria-UNDB
          path: dashboard_profissional.html