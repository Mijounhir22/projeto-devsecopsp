name: Esteira DevSecOps UNDB - Sucesso Total

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar Ferramentas
        run: |
          npm install -g snyk snyk-to-html
          python -m pip install --upgrade pip

      - name: 3. Criar Projeto Python Fake (Forçar Snyk)
        run: |
          # Criamos o manifesto de dependências
          echo "django==1.11.28" > requirements.txt
          echo "requests==2.6.0" >> requirements.txt
          echo "jinja2==2.10.1" >> requirements.txt
          # Criamos um setup.py básico para o Snyk 'validar' o projeto
          echo "from setuptools import setup" > setup.py
          echo "setup(name='projeto-tcc', version='1.0', install_requires=['django==1.11.28'])" >> setup.py

      - name: 4. Scanner Snyk (Modo de Varredura Profunda)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Usamos o --command=python3 para ele simular a instalacao e gerar o JSON real
          snyk test --file=requirements.txt --package-manager=pip --json > snyk_results.json

      - name: 5. Converter JSON para Dashboard Azul
        if: always()
        run: |
          # Se o snyk_results.json estiver vazio, este passo falha, entao garantimos que ele exista
          if [ -s snyk_results.json ]; then
            snyk-to-html -i snyk_results.json -o dashboard_profissional.html
          else
            echo "ERRO: O JSON veio vazio. Verificando Token ou Conexao."
          fi

      - name: 6. Upload do Artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Snyk-Final-UNDB
          path: dashboard_profissional.html