name: Auditoria de Bibliotecas
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vulnerabilidades:
    name: Esteira de Segurança DevSecOps
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 3. Instalar Ferramentas de Relatorio
        run: npm install -g snyk snyk-to-html bandit

      - name: 4. Gerar Relatórios e Link Direto (Snyk Monitor)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Este comando cria o link que você quer
          snyk monitor --all-projects
          # Gera o arquivo para o ZIP (caso precise de backup)
          snyk test --json | snyk-to-html -o relatorio_snyk.html
          bandit -r . -f html -o relatorio_bandit.html

      - name: 5. Converter JSON para HTML Visual
        continue-on-error: true
        run: snyk-to-html -i snyk_results.json -o relatorio_snyk.html || true

      - name: 6. Disponibilizar Relatórios para Download (Formato ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Seguranca-TCC
          path: |
            relatorio_snyk.html
            relatorio_bandit.html

      - name: 7. Status Final e Links Rápidos
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects

      - name: 8. Limpeza de Ambiente e Log Final
        if: always()
        run: echo "Análise concluída. Verifique o link na Etapa 4!"