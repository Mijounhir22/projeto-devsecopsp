name: Esteira DevSecOps - Snyk

on:
  push:
    branches: ["main", "principal"]

jobs:
  analise_seguranca:
    # Permissões necessárias para que o relatório apareça na aba Security
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Gitleaks (Scanner de Credenciais)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Snyk (Scanner de Vulnerabilidades)
        continue-on-error: true
        uses: snyk/actions/python-3.10@master
        with:
          args: --sarif-file-output=snyk.sarif --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 4. Gerar Relatorio HTML Profissional
        continue-on-error: true
        run: |
          npm install -g snyk-to-html
          snyk test --json | snyk-to-html -o resultado_final.html
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 5. Upload do Relatorio para aba Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: 6. Disponibilizar Relatorio HTML para Download
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Executivo-Seguranca
          path: resultado_final.html