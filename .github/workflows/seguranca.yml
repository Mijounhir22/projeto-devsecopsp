name: Esteira DevSecOps - Versao Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analise_seguranca:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixando o Codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Gitleaks (Procurar Senhas Expostas)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Horusec (Analise de Vulnerabilidades)
        uses: horusec/horusec-action@v2.1
        with:
          arguments: start -p="./" -e="true"