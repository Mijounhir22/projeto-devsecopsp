name: Auditoria de Bibliotecas
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  esteira-tcc:
    name: Esteira de Segurança DevSecOps (TCC)
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Configuração de Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 3. Instalação das Ferramentas de Auditoria
        run: npm install -g snyk snyk-to-html bandit

      - name: 4. Execução do Scanner Snyk (Cloud)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk monitor --all-projects
          snyk test --json > snyk_results.json

      - name: 5. Geração do Dashboard HTML (Interface Visual)
        continue-on-error: true
        run: snyk-to-html -i snyk_results.json -o dashboard_tcc_final.html

      - name: 6. Scanner de Segurança Bandit (SAST)
        continue-on-error: true
        run: bandit -r . -f html -o relatorio_bandit_tcc.html

      - name: 7. Empacotamento de Evidências para Avaliação
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            dashboard_tcc_final.html
            relatorio_bandit_tcc.html

      - name: 8. Verificação de Compliance e Encerramento
        if: always()
        run: |
          echo "Esteira de segurança executada com sucesso!"
          echo "Os relatórios visuais foram gerados para a banca examinadora."