name: Esteira DevSecOps - Analise Final

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analise_seguranca:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixando o Codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Gitleaks (Senhas e Chaves)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Horusec (Vulnerabilidades e LGPD)
        uses: fveloso/horusec-action@v1.0.2
        with:
          horusec-arguments: start -p="./" -e="true"