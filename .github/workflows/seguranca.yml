name: Esteira DevSecOps UNDB - Sucesso Marco

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente e Injetar Dependencias
        run: |
          npm install -g snyk snyk-to-html
          python -m pip install --upgrade pip
          # Criamos o arquivo na hora para garantir que o Snyk encontre as falhas
          # Você pode adicionar mais bibliotecas aqui para mostrar mais erros à banca
          echo "django==1.11.29" > requirements.txt
          echo "requests==2.6.0" >> requirements.txt
          echo "jinja2==2.4" >> requirements.txt
          pip install -r requirements.txt || true

      - name: 3. Scanner Snyk (Gerando Dashboard Azul)
        continue-on-error: true
        env:
          # Certifique-se de que o nome no GitHub Secrets seja exatamente SNYK_TOKEN
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O comando testa o arquivo e ja converte para o HTML visual do TCC
          snyk test --file=requirements.txt --package-manager=pip --json | snyk-to-html -o dashboard_profissional.html

      - name: 4. Upload do Relatorio para Download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Snyk-UNDB
          path: dashboard_profissional.html