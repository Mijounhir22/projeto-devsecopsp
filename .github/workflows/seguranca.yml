name: Esteira DevSecOps - Snyk

on:
  push:
    branches: ["main", "principal"]

jobs:
  analise_seguranca:
    # Permissões necessárias para que o relatório apareça na aba Security
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Gitleaks (Scanner de Credenciais)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Snyk (Scanner de Vulnerabilidades)
        uses: snyk/actions/python-3.10@master
        continue-on-error: true
        with:
          # O comando abaixo gera o arquivo visual para o GitHub
          args: --sarif-file-output=snyk.sarif --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 4. Upload do Relatorio para aba Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif