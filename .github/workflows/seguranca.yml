name: Esteira DevSecOps UNDB - Sucesso Março

on: [push]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar Ambiente (Python e Ferramentas)
        run: |
          npm install -g snyk snyk-to-html
          # Garante que o Django vulnerável seja instalado para o Bandit e Snyk detectarem
          pip install bandit django==1.11.29 requests==2.6.0 || true

      - name: 3. Scanner Snyk (Forçando detecção do requirements.txt)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Apontamos diretamente para o arquivo para evitar "0 vulnerabilidades"
          snyk test --file=requirements.txt --package-manager=pip --json > snyk_results.json || echo "{}" > snyk_results.json

      - name: 4. Gerar Dashboard Profissional (Azul e Branco)
        if: always()
        run: |
          # Transforma o JSON no relatório visual do TCC
          snyk-to-html -i snyk_results.json -o dashboard_profissional.html

      - name: 5. Scanner SAST (Bandit - Análise de Código)
        continue-on-error: true
        run: |
          # Analisa as falhas de segurança no seu código Python
          bandit -r . -f html -o relatorio_bandit.html || true

      - name: 6. Upload dos Resultados para Download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            dashboard_profissional.html
            relatorio_bandit.html