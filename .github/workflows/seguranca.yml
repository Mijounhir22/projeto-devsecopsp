name: Auditoria de Bibliotecas
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  esteira-tcc:
    name: Esteira de Segurança DevSecOps (TCC)
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Preparar Ambiente e Ferramentas
        run: |
          npm install -g snyk snyk-to-html
          pip install bandit django paramiko || true

      - name: 4. Scanner Snyk (Gerar Dados do Dashboard)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # O segredo é o comando abaixo gerar o JSON mesmo com erro (usando o || true)
          snyk test --json --skip-unresolved > snyk_results.json || true

      - name: 5. Geração do Dashboard HTML (Visual Profissional)
        if: always()
        run: |
          # Transforma os dados no relatório que abre no Google Chrome
          snyk-to-html -i snyk_results.json -o relatorio_visual_snyk.html || echo "Erro na conversão"

      - name: 6. Scanner SAST (Bandit)
        continue-on-error: true
        run: bandit -r . -f html -o relatorio_bandit_tcc.html || true

      - name: 7. Disponibilizar Relatórios para Download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Evidencias-Seguranca-TCC
          path: |
            relatorio_visual_snyk.html
            relatorio_bandit_tcc.html

      - name: 8. Verificação de Falhas Críticas (Status do Pipeline)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Validando regras... O X VERMELHO aparecerá se houver insegurança."
          snyk test --all-projects --severity-threshold=high --skip-unresolved