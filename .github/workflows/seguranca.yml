name: Auditoria de Bibliotecas
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve avisos de Node.js

jobs:
  vulnerabilidades:
    name: Esteira de Segurança DevSecOps
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Repositorio
        uses: actions/checkout@v4

      - name: 2. Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 3. Instalar Ferramentas de Relatorio
        run: npm install -g snyk snyk-to-html bandit

      - name: 4. Scanner Snyk e Link Oficial
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Gera o link para o site do Snyk
          snyk monitor --all-projects
          # Gera o arquivo bruto para conversão
          snyk test --json > snyk_results.json

      - name: 5. Gerar Dashboard HTML Profissional
        continue-on-error: true
        run: |
          # Transforma o JSON no Dashboard colorido que você quer
          snyk-to-html -i snyk_results.json -o dashboard_seguranca.html

      - name: 6. Auditoria de Código Python (Bandit)
        continue-on-error: true
        run: bandit -r . -f html -o relatorio_bandit.html

      - name: 7. Disponibilizar Dashboard para Download
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Visual-Graficos
          path: |
            dashboard_seguranca.html
            relatorio_bandit.html

      - name: 8. Verificacao de Falhas Criticas (Status do Pipeline)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          echo "Validando segurança final do repositório..."
          snyk test --all-projects --severity-threshold=high